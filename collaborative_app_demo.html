<!--
PROYECTO NIVEL SENIOR - Collaborative Tasks App
Stack:
- Vanilla JS (arquitectura modular)
- Firebase (Realtime Database)
- CSS Grid (layout moderno)

Características:
- Sincronización en tiempo real
- Multiusuario
- CRUD de tareas
- Arquitectura limpia (separación de lógica)
- UI reactiva sin frameworks
-->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collaborative Tasks</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

.container {
    display: grid;
    grid-template-columns: 1fr;
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
}

.task-input {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
}

input {
    padding: 10px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #22c55e;
    color: white;
    cursor: pointer;
}

.task-list {
    margin-top: 20px;
    display: grid;
    gap: 10px;
}

.task {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 10px;
    align-items: center;
}

.done {
    text-decoration: line-through;
    opacity: 0.6;
}
</style>
</head>
<body>

<div class="container">
    <h1>Realtime Tasks</h1>

    <div class="task-input">
        <input id="taskInput" placeholder="Nueva tarea...">
        <button onclick="addTask()">Agregar</button>
    </div>

    <div id="taskList" class="task-list"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ==========================
// CONFIG FIREBASE
// ==========================
const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_APP.firebaseapp.com",
    databaseURL: "https://YOUR_APP.firebaseio.com",
    projectId: "YOUR_APP",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const tasksRef = db.ref("tasks");

// ==========================
// STATE
// ==========================
const state = {
    tasks: {}
};

// ==========================
// RENDER
// ==========================
function render() {
    const container = document.getElementById("taskList");
    container.innerHTML = "";

    Object.entries(state.tasks).forEach(([id, task]) => {
        const div = document.createElement("div");
        div.className = "task";

        const text = document.createElement("span");
        text.textContent = task.text;
        if (task.done) text.classList.add("done");

        const toggleBtn = document.createElement("button");
        toggleBtn.textContent = "✔";
        toggleBtn.onclick = () => toggleTask(id, task.done);

        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "✖";
        deleteBtn.onclick = () => deleteTask(id);

        div.appendChild(text);
        div.appendChild(toggleBtn);
        div.appendChild(deleteBtn);

        container.appendChild(div);
    });
}

// ==========================
// CRUD
// ==========================
function addTask() {
    const input = document.getElementById("taskInput");
    const text = input.value.trim();
    if (!text) return;

    const newTask = {
        text,
        done: false,
        createdAt: Date.now()
    };

    tasksRef.push(newTask);
    input.value = "";
}

function toggleTask(id, done) {
    tasksRef.child(id).update({ done: !done });
}

function deleteTask(id) {
    tasksRef.child(id).remove();
}

// ==========================
// REALTIME SYNC
// ==========================
tasksRef.on("value", snapshot => {
    state.tasks = snapshot.val() || {};
    render();
});

</script>

</body>
</html>

<!--
EXTENSIONES NIVEL SENIOR:

- Autenticación (Firebase Auth)
- Permisos por usuario (multi-tenant)
- WebSockets fallback (offline-first)
- IndexedDB cache
- Notificaciones push
- Drag & Drop (kanban)
- Migración a arquitectura modular ES Modules
- Backend propio (Node + WebSocket server)
-->
